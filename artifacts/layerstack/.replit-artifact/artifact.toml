kind = "web"
previewPath = "/"
title = "LayerStack"
version = "1.0.0"
id = "artifacts/layerstack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26159

[services.development]
run = "pnpm --filter @workspace/layerstack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/layerstack", "run", "build" ]
publicDir = "artifacts/layerstack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26159"
BASE_PATH = "/"
